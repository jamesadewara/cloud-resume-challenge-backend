name: Deploy Backend to Lambda

on:
  push:
    branches: [main, staging]
    paths:
      - "app/**"
      - "tests/**"
      - "requirements.txt"
      - ".github/workflows/deploy.yml"
  pull_request:
    branches: [main, staging]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  PYTHON_VERSION: "3.12"
  LAMBDA_FUNCTION_NAME: ${{ vars.LAMBDA_FUNCTION_NAME }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx mongomock-motor

      - name: Run tests
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          pytest tests/ -v --tb=short --color=yes

      - name: Run linting
        run: |
          pip install ruff
          ruff check app/

  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build deployment package
        run: |
          mkdir -p package
          pip install -r requirements.txt -t package --quiet
          cp -r app package/
          
          # Create .env file from GitHub Secrets/Vars
          echo "MONGODB_URL=${{ secrets.MONGODB_URL }}" > package/app/.env
          echo "DB_NAME=${{ vars.DB_NAME }}" >> package/app/.env
          echo "ALLOWED_ORIGINS=${{ secrets.ALLOWED_ORIGINS }}" >> package/app/.env
          
          cd package
          zip -r ../lambda_package.zip . -x "*.pyc" -x "__pycache__/*"
          cd ..
          echo "Package size: $(du -h lambda_package.zip | cut -f1)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-package
          path: lambda_package.zip
          retention-days: 5

  deploy:
    name: Deploy to Lambda
    runs-on: ubuntu-latest
    needs: build
    environment: production
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-duration-seconds: 900

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: lambda-package

      - name: Update Lambda function code
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --zip-file fileb://lambda_package.zip \
            --publish
          echo "Lambda code updated"

      - name: Wait for update
        run: |
          aws lambda wait function-updated \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }}
          echo "Lambda update complete"

      - name: Smoke test
        run: |
          # Give the Lambda a few seconds to initialize
          sleep 5
          # Use the API Gateway URL from your GitHub Variables
          # Note: Ensure you have added API_GATEWAY_URL to your GitHub Repo Variables
          curl -sf "${{ vars.API_GATEWAY_URL }}/health" || echo "Smoke test skipped (API_GATEWAY_URL var may be missing)"