name: Deploy Backend to Lambda

on:
  push:
    branches: [main, staging]
    paths:
      - "src/**"
      - "tests/**"
      - "requirements.txt"
      - ".github/workflows/deploy.yml"
  pull_request:
    branches: [main, staging]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  PYTHON_VERSION: "3.12"
  LAMBDA_FUNCTION_NAME: resume-api

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx mongomock-motor

      - name: Run tests
        run: pytest tests/ -v --tb=short --color=yes

      - name: Run linting
        run: |
          pip install ruff
          ruff check src/

  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build deployment package
        run: |
          mkdir -p package
          pip install -r requirements.txt -t package --quiet
          cp -r src/* package/
          cd package
          zip -r ../lambda_package.zip . -x "*.pyc" -x "__pycache__/*" -x "*.dist-info/*" -x "*.egg-info/*"
          cd ..
          echo "Package size: $(du -h lambda_package.zip | cut -f1)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-package
          path: lambda_package.zip
          retention-days: 5

  deploy:
    name: Deploy to Lambda
    runs-on: ubuntu-latest
    needs: build
    environment: production
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-duration-seconds: 900

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: lambda-package

      - name: Update Lambda function code
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --zip-file fileb://lambda_package.zip \
            --publish
          echo "Lambda code updated"

      - name: Wait for update
        run: |
          aws lambda wait function-updated \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }}
          echo "Lambda update complete"

      - name: Smoke test
        run: |
          sleep 5
          API_URL=$(aws lambda get-function-url-config \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --query 'FunctionUrl' --output text 2>/dev/null || echo "")
          if [ -n "$API_URL" ]; then
            curl -sf "${API_URL}/api/health" || echo "Smoke test skipped"
          fi